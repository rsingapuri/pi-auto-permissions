name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run pack:check
      - run: npm run audit:runtime
      - run: npm run sbom > pi-auto-permissions.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: pi-auto-permissions.cdx.json

  real-sandbox:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - if: runner.os == 'Linux'
        run: sudo apt-get update
      - if: runner.os == 'Linux'
        run: sudo apt-get install -y bubblewrap socat ripgrep
      - run: npm ci
      - run: npm run test:real-sandbox
